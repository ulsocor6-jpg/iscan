<!--
  ══════════════════════════════════════════════════════════════
  ISCAN — USDC/USDT → PHP Cash In Panel
  Drop this into the "External / Channel" tab of dashboard_v3.html
  ══════════════════════════════════════════════════════════════
-->

<!-- ── STYLES (add inside <style> or dashboard.css) ─────────────── -->
<style>
.crypto-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Token selector */
.token-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 4px;
}
.token-btn {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all .15s;
}
.token-btn.active {
  border-color: var(--accent);
  background: rgba(45,232,162,.10);
  color: var(--accent);
}
.token-icon {
  width: 20px; height: 20px;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}
.usdc-icon { background: #2775ca; color: #fff; }
.usdt-icon { background: #26a17b; color: #fff; }

/* Channel selector */
.channel-selector {
  display: flex;
  gap: 8px;
}
.channel-btn {
  flex: 1;
  padding: 10px 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: all .15s;
}
.channel-btn.active {
  border-color: var(--accent);
  background: rgba(45,232,162,.08);
  color: var(--text);
}
.channel-btn .ch-name { font-weight: 600; font-size: 12.5px; }
.channel-btn .ch-fee  { font-size: 10px; color: var(--muted); }
.channel-btn.active .ch-fee { color: var(--accent); }

/* Rate box */
.rate-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.rate-label { font-size: 11px; color: var(--muted); }
.rate-value { font-size: 15px; font-weight: 700; color: var(--accent); }
.rate-refresh {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  padding: 0;
  transition: transform .3s;
}
.rate-refresh:hover { color: var(--accent); }
.rate-refresh.spinning { animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Conversion breakdown */
.breakdown {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  font-size: 12.5px;
}
.breakdown-row {
  display: flex;
  justify-content: space-between;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
}
.breakdown-row:last-child { border-bottom: none; }
.breakdown-row.total {
  background: rgba(45,232,162,.06);
  color: var(--text);
  font-weight: 700;
}
.breakdown-row.total .bd-val { color: var(--accent); font-size: 14px; }

/* Steps */
.step-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 6px;
}

/* Status banner */
.status-banner {
  display: none;
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 12.5px;
  line-height: 1.5;
}
.status-banner.pending  { background: rgba(251,191,36,.08);  border: 1px solid rgba(251,191,36,.25); color: #fbbf24; }
.status-banner.success  { background: rgba(45,232,162,.08);  border: 1px solid rgba(45,232,162,.25); color: var(--accent); }
.status-banner.error    { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.25); color: #f87171; }

/* GCash redirect notice */
.gcash-notice {
  font-size: 11.5px;
  color: var(--muted);
  text-align: center;
  margin-top: -6px;
}
.gcash-notice a { color: var(--accent); text-decoration: none; }
</style>

<!-- ── HTML PANEL ─────────────────────────────────────────────── -->
<div class="crypto-panel" id="crypto-onramp-panel">

  <!-- Step 1: Token -->
  <div>
    <div class="step-label">1 — Select Token</div>
    <div class="token-selector">
      <button class="token-btn active" data-token="USDC" onclick="selectToken('USDC', this)">
        <span class="token-icon usdc-icon">U</span> USDC
      </button>
      <button class="token-btn" data-token="USDT" onclick="selectToken('USDT', this)">
        <span class="token-icon usdt-icon">₮</span> USDT
      </button>
    </div>
  </div>

  <!-- Step 2: Channel -->
  <div>
    <div class="step-label">2 — Payout Channel</div>
    <div class="channel-selector">
      <button class="channel-btn active" data-channel="maya" onclick="selectChannel('maya', this)">
        <span class="ch-name">Maya</span>
        <span class="ch-fee">1.5% fee</span>
      </button>
      <button class="channel-btn" data-channel="gcash" onclick="selectChannel('gcash', this)">
        <span class="ch-name">GCash</span>
        <span class="ch-fee">2.0% fee</span>
      </button>
    </div>
  </div>

  <!-- Live Rate -->
  <div class="rate-box">
    <div>
      <div class="rate-label">Live Rate</div>
      <div class="rate-value" id="or-rate-display">Fetching…</div>
    </div>
    <button class="rate-refresh" id="or-refresh-btn" onclick="refreshRate()" title="Refresh rate">↻</button>
  </div>

  <!-- Step 3: Amount -->
  <div>
    <div class="step-label">3 — Enter USD Amount</div>
    <div class="input-wrap">
      <div class="input-prefix">$</div>
      <input
        id="or-usd-amount"
        type="number"
        min="1"
        max="10000"
        step="0.01"
        placeholder="0.00"
        oninput="updateBreakdown()"
      />
    </div>
  </div>

  <!-- Breakdown -->
  <div class="breakdown" id="or-breakdown" style="display:none">
    <div class="breakdown-row">
      <span>Gross PHP</span>
      <span class="bd-val" id="bd-gross">—</span>
    </div>
    <div class="breakdown-row">
      <span>Fee (<span id="bd-fee-pct">—</span>)</span>
      <span class="bd-val" id="bd-fee">—</span>
    </div>
    <div class="breakdown-row total">
      <span>You Receive</span>
      <span class="bd-val" id="bd-net">—</span>
    </div>
  </div>

  <!-- Step 4: Mobile -->
  <div>
    <div class="step-label">4 — Recipient Mobile Number</div>
    <div class="input-wrap">
      <div class="input-prefix">+63</div>
      <input
        id="or-mobile"
        type="tel"
        placeholder="9XXXXXXXXX"
        maxlength="10"
      />
    </div>
  </div>

  <!-- Step 5: Tx Hash -->
  <div>
    <div class="step-label">5 — On-Chain Transaction Hash</div>
    <div class="input-wrap">
      <input
        id="or-txhash"
        type="text"
        placeholder="0x… (paste your USDC/USDT send tx hash)"
        style="font-family: monospace; font-size: 12px;"
      />
    </div>
  </div>

  <!-- Status banner -->
  <div class="status-banner" id="or-status"></div>

  <!-- GCash redirect notice (hidden by default) -->
  <div class="gcash-notice" id="or-gcash-notice" style="display:none">
    GCash will open a verification page. <a href="#" id="or-gcash-link" target="_blank">Click here if it didn't open automatically →</a>
  </div>

  <!-- Submit -->
  <button class="btn-primary" id="or-submit-btn" onclick="submitConversion()">
    Convert &amp; Send to <span id="or-channel-label">Maya</span>
  </button>

</div>

<!-- ── JAVASCRIPT ─────────────────────────────────────────────── -->
<script>
(function () {
  let _token   = 'USDC';
  let _channel = 'maya';
  let _rate    = null;

  const FEE = { maya: 0.015, gcash: 0.020 };
  const FEE_LABEL = { maya: '1.5%', gcash: '2.0%' };

  // ── Token / Channel Selection ──────────────────────────────
  window.selectToken = function (token, el) {
    _token = token;
    document.querySelectorAll('.token-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    updateBreakdown();
  };

  window.selectChannel = function (channel, el) {
    _channel = channel;
    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('or-channel-label').textContent =
      channel === 'maya' ? 'Maya' : 'GCash';
    updateBreakdown();
  };

  // ── Rate ────────────────────────────────────────────────────
  window.refreshRate = async function () {
    const btn = document.getElementById('or-refresh-btn');
    btn.classList.add('spinning');
    document.getElementById('or-rate-display').textContent = 'Fetching…';
    try {
      const res  = await fetch(`/api/v1/onramp/rate?token=${_token}&channel=${_channel}&amount=1`);
      const data = await res.json();
      _rate = data.phpRate;
      document.getElementById('or-rate-display').textContent =
        `₱${_rate.toFixed(4)} / 1 ${_token}`;
      updateBreakdown();
    } catch {
      document.getElementById('or-rate-display').textContent = 'Rate unavailable';
    } finally {
      btn.classList.remove('spinning');
    }
  };

  // ── Breakdown ───────────────────────────────────────────────
  window.updateBreakdown = function () {
    const usd = parseFloat(document.getElementById('or-usd-amount').value) || 0;
    const breakdown = document.getElementById('or-breakdown');

    if (!_rate || usd <= 0) { breakdown.style.display = 'none'; return; }

    const gross = usd * _rate;
    const fee   = gross * FEE[_channel];
    const net   = gross - fee;

    document.getElementById('bd-gross').textContent   = `₱${gross.toFixed(2)}`;
    document.getElementById('bd-fee').textContent     = `-₱${fee.toFixed(2)}`;
    document.getElementById('bd-fee-pct').textContent = FEE_LABEL[_channel];
    document.getElementById('bd-net').textContent     = `₱${net.toFixed(2)}`;
    breakdown.style.display = 'block';
  };

  // ── Submit ──────────────────────────────────────────────────
  window.submitConversion = async function () {
    const usdAmount    = parseFloat(document.getElementById('or-usd-amount').value);
    const mobileRaw    = document.getElementById('or-mobile').value.trim();
    const txHash       = document.getElementById('or-txhash').value.trim();
    const mobileNumber = '+63' + mobileRaw;

    // Client-side validation
    if (!usdAmount || usdAmount < 1) return showStatus('error', 'Enter a valid USD amount (min $1).');
    if (!/^9\d{9}$/.test(mobileRaw))  return showStatus('error', 'Enter a valid PH mobile number (9XXXXXXXXX).');
    if (!txHash.startsWith('0x') || txHash.length < 60) return showStatus('error', 'Paste a valid on-chain transaction hash.');

    const btn = document.getElementById('or-submit-btn');
    btn.disabled = true;
    btn.textContent = 'Processing…';
    showStatus('pending', `⏳ Converting $${usdAmount} ${_token} → PHP via ${_channel.toUpperCase()}…`);
    document.getElementById('or-gcash-notice').style.display = 'none';

    try {
      const res  = await fetch('/api/v1/onramp/convert', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token: _token, usdAmount, channel: _channel, mobileNumber, txHash }),
      });
      const data = await res.json();

      if (!res.ok || !data.success) throw new Error(data.error || 'Conversion failed');

      const msg =
        `✅ Success! ₱${data.netPHP.toFixed(2)} sent to ${mobileNumber} via ${_channel.toUpperCase()}.\n` +
        `Reference: ${data.referenceId}`;
      showStatus('success', msg);

      // GCash redirect
      if (_channel === 'gcash' && data.redirectUrl) {
        const link = document.getElementById('or-gcash-link');
        link.href = data.redirectUrl;
        document.getElementById('or-gcash-notice').style.display = 'block';
        window.open(data.redirectUrl, '_blank');
      }

      // Reset form after 3s
      setTimeout(resetForm, 3000);

    } catch (err) {
      showStatus('error', `❌ ${err.message}`);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `Convert &amp; Send to <span id="or-channel-label">${_channel === 'maya' ? 'Maya' : 'GCash'}</span>`;
    }
  };

  // ── Helpers ─────────────────────────────────────────────────
  function showStatus(type, msg) {
    const el = document.getElementById('or-status');
    el.className = `status-banner ${type}`;
    el.textContent = msg;
    el.style.display = 'block';
  }

  function resetForm() {
    document.getElementById('or-usd-amount').value = '';
    document.getElementById('or-mobile').value     = '';
    document.getElementById('or-txhash').value     = '';
    document.getElementById('or-breakdown').style.display = 'none';
    document.getElementById('or-status').style.display    = 'none';
  }

  // Auto-fetch rate on load
  refreshRate();
  setInterval(refreshRate, 60_000); // refresh every 60s
})();
</script>
