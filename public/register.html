<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSCAN — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c12; --surface: #0e1520; --surface2: #141d2e; --border: #1e2d45;
    --accent: #00d4ff; --accent2: #0094ff; --danger: #ff4d6a; --text: #e8f0fe; --muted: #5a7a9a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
  .bg-glow { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,148,255,0.12) 0%, transparent 70%); }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; }
  .orb1 { width: 400px; height: 400px; background: rgba(0,212,255,0.05); top: -100px; right: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(0,148,255,0.06); bottom: -50px; left: -50px; }
  .container { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px; animation: fadeUp 0.6s ease forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .logo-area { text-align: center; margin-bottom: 36px; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.4rem; letter-spacing: -1px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px; box-shadow: 0 0 60px rgba(0,212,255,0.06), 0 24px 60px rgba(0,0,0,0.5); }
  .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.4rem; margin-bottom: 24px; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--accent); }
  .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; color: #080c12; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-box { background: rgba(255,77,106,0.1); border: 1px solid rgba(255,77,106,0.3); border-radius: 8px; padding: 12px; font-size: 0.85rem; color: var(--danger); margin-bottom: 18px; display: none; }
  .error-box.show { display: block; }
  .success-box { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); border-radius: 8px; padding: 12px; font-size: 0.85rem; color: var(--accent); margin-bottom: 18px; display: none; }
  .success-box.show { display: block; }
  .footer-link { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--muted); }
  .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .name-row { display: flex; gap: 10px; }
  .name-row .field { flex: 1; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <div class="logo-area"><div class="logo">iSCAN<span>.</span></div></div>
  <div class="card">
    <div class="card-title">Create Account</div>

    <div class="error-box" id="errorBox"></div>
    <div class="success-box" id="successBox"></div>

    <div class="name-row">
      <div class="field"><label>First Name</label><input type="text" id="firstName" autocomplete="given-name"></div>
      <div class="field"><label>Last Name</label><input type="text" id="lastName" autocomplete="family-name"></div>
    </div>
    <div class="field"><label>Email Address</label><input type="email" id="email" autocomplete="email"></div>
    <div class="field"><label>Password</label><input type="password" id="password" autocomplete="new-password"></div>

    <button class="btn" id="regBtn" onclick="handleRegister()">Register</button>
    <div class="footer-link">Already have an account? <a href="/login.html">Sign In</a></div>
  </div>
</div>

<script>
  function showError(message) {
    const box = document.getElementById('errorBox');
    box.textContent = message;
    box.classList.add('show');
    document.getElementById('successBox').classList.remove('show');
  }

  function showSuccess(message) {
    const box = document.getElementById('successBox');
    box.textContent = message;
    box.classList.add('show');
    document.getElementById('errorBox').classList.remove('show');
  }

  function clearMessages() {
    document.getElementById('errorBox').classList.remove('show');
    document.getElementById('successBox').classList.remove('show');
  }

  async function handleRegister() {
    clearMessages();

    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('regBtn');

    if (!firstName || !lastName || !email || !password) {
      showError('Please fill in all fields.');
      return;
    }

    if (password.length < 6) {
      showError('Password must be at least 6 characters.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      const res = await fetch('/api/v1/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firstName, lastName, email, password })
      });

      const result = await res.json();

      if (!res.ok) {
        showError(result.message || 'Registration failed. Please try again.');
        return;
      }

      showSuccess('Account created! Check your email for a verification link.');
      btn.textContent = 'Check your email';

    } catch (e) {
      showError('Network error. Is the server running?');
    } finally {
      btn.disabled = false;
      if (btn.textContent === 'Creating account...') {
        btn.textContent = 'Register';
      }
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleRegister();
  });
</script>
</body>
</html>
