<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSCAN — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c12; --surface:#0e1520; --surface2:#141d2e;
    --border:#1e2d45; --accent:#00d4ff; --accent2:#0094ff;
    --danger:#ff4d6a; --text:#e8f0fe; --muted:#5a7a9a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .bg-grid{position:fixed;inset:0;
    background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;}
  .bg-glow{position:fixed;inset:0;
    background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(0,148,255,0.12) 0%,transparent 70%);}
  .orb{position:fixed;border-radius:50%;filter:blur(80px);}
  .orb1{width:400px;height:400px;background:rgba(0,212,255,0.05);top:-100px;right:-100px;}
  .orb2{width:300px;height:300px;background:rgba(0,148,255,0.06);bottom:-50px;left:-50px;}
  .container{position:relative;z-index:1;width:100%;max-width:420px;padding:20px;animation:fadeUp .6s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .logo-area{text-align:center;margin-bottom:36px;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2.4rem;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:36px;box-shadow:0 0 60px rgba(0,212,255,0.06),0 24px 60px rgba(0,0,0,0.5);}
  .title{font-family:'Syne';font-weight:700;font-size:1.4rem;margin-bottom:24px;}
  .field{margin-bottom:18px;}
  label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:8px;
    text-transform:uppercase;letter-spacing:.08em;}
  input{width:100%;padding:13px 16px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface2);color:var(--text);outline:none;font-size:1rem;}
  input:focus{border-color:var(--accent);}
  .btn{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;
    font-family:'Syne';font-weight:700;font-size:1rem;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#061018;}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);
    margin-top:8px;}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .alert{padding:12px;border-radius:8px;font-size:0.85rem;display:none;margin-bottom:16px;}
  .alert-error{background:rgba(255,77,106,0.1);border:1px solid rgba(255,77,106,0.3);color:var(--danger);}
  .alert-success{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--accent);}
  .footer{text-align:center;margin-top:18px;font-size:0.85rem;color:var(--muted);}
  .footer a{color:var(--accent);text-decoration:none;}
  .forgot-link{display:block;text-align:right;font-size:0.8rem;color:var(--muted);
    margin-top:-10px;margin-bottom:18px;cursor:pointer;}
  .forgot-link:hover{color:var(--accent);}
  .panel{display:none;}
  .panel.active{display:block;}
  .back-link{font-size:0.82rem;color:var(--muted);cursor:pointer;margin-bottom:20px;display:inline-block;}
  .back-link:hover{color:var(--accent);}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <div class="logo-area"><div class="logo">iSCAN.</div></div>

  <div class="card">

    <!-- LOGIN PANEL -->
    <div id="panel-login" class="panel active">
      <div class="title">Welcome Back</div>
      <div id="login-error" class="alert alert-error"></div>
      <div id="login-success" class="alert alert-success"></div>
      <div class="field">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="you@email.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="••••••••" />
      </div>
      <span class="forgot-link" onclick="showPanel('forgot')">Forgot password?</span>
      <button class="btn" id="login-btn" onclick="doLogin()">Login</button>
      <div class="footer">No account yet? <a href="/register.html">Create Account</a></div>
    </div>

    <!-- FORGOT PASSWORD PANEL -->
    <div id="panel-forgot" class="panel">
      <span class="back-link" onclick="showPanel('login')">← Back to login</span>
      <div class="title">Reset Password</div>
      <div id="forgot-error" class="alert alert-error"></div>
      <div id="forgot-success" class="alert alert-success"></div>
      <div class="field">
        <label>Email</label>
        <input id="forgot-email" type="email" placeholder="you@email.com" />
      </div>
      <button class="btn" id="forgot-btn" onclick="doForgot()">Send Reset Link</button>
    </div>

  </div>
</div>

<script>
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.className = 'alert alert-' + type;
  el.textContent = msg;
  el.style.display = 'block';
}

function hideAlert(id) {
  document.getElementById(id).style.display = 'none';
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  hideAlert('login-error');
  hideAlert('login-success');

  if (!email || !password) {
    showAlert('login-error', 'Please fill in all fields.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const res = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      showAlert('login-error', data.message || 'Login failed.', 'error');
      return;
    }

    showAlert('login-success', 'Login successful. Redirecting...', 'success');
    setTimeout(() => { window.location.href = '/dashboard'; }, 800);

  } catch (err) {
    showAlert('login-error', 'Server error. Try again.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Login';
  }
}

async function doForgot() {
  const btn = document.getElementById('forgot-btn');
  const email = document.getElementById('forgot-email').value.trim();

  hideAlert('forgot-error');
  hideAlert('forgot-success');

  if (!email) {
    showAlert('forgot-error', 'Please enter your email.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const res = await fetch('/api/v1/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    // Always show success message (don't leak whether email exists)
    showAlert('forgot-success', 'If that email is registered, a reset link has been sent.', 'success');

  } catch (err) {
    showAlert('forgot-error', 'Server error. Try again.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const active = document.querySelector('.panel.active').id;
    if (active === 'panel-login') doLogin();
    if (active === 'panel-forgot') doForgot();
  }
});
</script>
</body>
</html>
